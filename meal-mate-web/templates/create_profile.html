<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Profile</title>
    <!-- Add the Bootstrap CSS link in your <head> tag -->
<link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9a/16+Fvmd1lGUoQmCFL6CxrBbM8iXTwS7J1r5F6ZVsHmnRlg0L+gfGd8MOqchYf" crossorigin="anonymous">


<div id="spinner" class="spinner-border text-primary" style="display: none;" role="status">
    <span class="sr-only">Loading...</span>
  </div>
  
</head>
<body>
    <h1>Create your Profile</h1>
    <form method="POST">
        <label for="name">Name: </label>
        <input type="text" id="name" name="name" required><br><br>
        <label for="age">Age: </label>
        <input type="number" id="age" name="age" required><br><br>
        <label for="health_condition">Health Condition: </label>
        <input type="text" id="health_condition" name="health_condition" required><br><br>
        <button type="submit">Create Profile</button>
    </form>
</body>
</html>
